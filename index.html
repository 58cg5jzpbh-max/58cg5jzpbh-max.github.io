<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miner Coins · Withdrawal Soon</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <div class="container">
    <!-- Top decoration -->
    <div class="glow-orb glow-orb--1"></div>
    <div class="glow-orb glow-orb--2"></div>

    <div class="card">
      <!-- Badge -->
      <div class="badge">
        <i class="fas fa-hard-hat"></i>
        <span>MINER COINS</span>
      </div>

      <!-- Main icon -->
      <div class="icon-stack">
        <i class="fas fa-coins coin-icon"></i>
        <i class="fas fa-arrow-right arrow-icon"></i>
        <i class="fas fa-wallet wallet-icon"></i>
      </div>

      <!-- Heading -->
      <h1>Withdrawal<br /><span class="highlight">Coming Soon</span></h1>

      <!-- Subtext -->
      <p class="description">
        We're preparing the withdrawal system for Miner Coins.
        <br />Stay tuned — it's almost ready!
      </p>

      <!-- Countdown -->
      <div class="countdown" id="countdown">
        <div class="time-box">
          <span class="time-number" id="days">00</span>
          <span class="time-label">Days</span>
        </div>
        <div class="time-box">
          <span class="time-number" id="hours">00</span>
          <span class="time-label">Hours</span>
        </div>
        <div class="time-box">
          <span class="time-number" id="minutes">00</span>
          <span class="time-label">Mins</span>
        </div>
        <div class="time-box">
          <span class="time-number" id="seconds">00</span>
          <span class="time-label">Secs</span>
        </div>
      </div>

      <!-- Progress Bar -->
      <div class="progress-wrapper">
        <div class="progress-bar" id="progressBar"></div>
        <div class="progress-label">
          <span>Preparation</span>
          <span id="progressText">0%</span>
        </div>
      </div>

      <!-- Status -->
      <div class="status">
        <i class="fas fa-circle status-dot"></i>
        <span>Withdrawal will be available soon</span>
      </div>

      <!-- Footer -->
      <div class="footer">
        <span><i class="fas fa-lock"></i> Secured</span>
        <span><i class="fas fa-database"></i> 2FA Enabled</span>
        <span><i class="fas fa-check-circle"></i> Mining Active</span>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
