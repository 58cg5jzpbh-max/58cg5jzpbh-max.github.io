<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        p {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 5px;
            color: #333;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello!</h1>
        <p>Welcome to your GitHub Pages site. Click the button below to interact with this page.</p>
        <button onclick="handleClick()">Click Me</button>
        <div class="message" id="message"></div>
    </div>

    <script>
        let clickCount = 0;

        function handleClick() {
            clickCount++;
            const message = document.getElementById('message');
            
            if (clickCount === 1) {
                message.textContent = 'You clicked once!';
            } else if (clickCount === 5) {
                message.textContent = 'You\'re on a roll! 5 clicks!';
            } else if (clickCount === 10) {
                message.textContent = 'Wow! 10 clicks! Keep going!';
            } else {
                message.textContent = `You've clicked ${clickCount} times!`;
            }
        }

        // Welcome message in console
        console.log('Welcome to your GitHub Pages site!');
    </script>
</body>
</html>
