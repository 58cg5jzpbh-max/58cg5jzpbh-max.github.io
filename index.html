<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Divinelove Ezeh - Videos</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 14px 20px 30px;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.8), transparent);
            color: white;
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            pointer-events: none;
            max-width: 450px;
            margin: 0 auto;
        }

        .header span {
            color: #ff0050;
        }

        .video-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="header">📱 <span>Divinelove</span> Ezeh</div>

    <div class="video-container">
        <!-- REPLACE PLAYLIST_ID_HERE with your actual Playlist ID -->
        <iframe 
            src="https://www.youtube.com/embed/videoseries?list=PLFgquLnL59alCl_2TQvOiD5Vgm1hCaGSI&autoplay=1&mute=0&loop=1"
            allow="autoplay; encrypted-media; accelerometer; gyroscope"
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>
